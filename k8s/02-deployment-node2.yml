---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-node2
  namespace: labo
  labels:
    app: hello-node2
    version: "1.0"
spec:
  replicas: 2                         # 2 pods sur le nœud 2
  selector:
    matchLabels:
      app: hello-node2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hello-node2
        version: "1.0"
    spec:
      # ── Placement : nœud 2 uniquement ──────────────────────────────────────
      nodeSelector:
        role: node2

      # ── Hardening identique au nœud 1 ─────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hello-node2
                topologyKey: kubernetes.io/hostname

      containers:
        - name: hello-node2
          image: hello-html:1.0
          imagePullPolicy: Never

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

          ports:
            - containerPort: 80
              name: http

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: cache-dir
              mountPath: /var/cache/nginx
            - name: run-dir
              mountPath: /var/run

      volumes:
        - name: tmp-dir
          emptyDir: {}
        - name: cache-dir
          emptyDir: {}
        - name: run-dir
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: hello-node2
  namespace: labo
spec:
  selector:
    app: hello-node2
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30092